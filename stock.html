<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คลังสินค้า - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  .domain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
  .domain-card {
    background: var(--panel); border-radius: 14px; padding: 28px 24px; text-decoration: none; color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.3); border: 1px solid var(--stroke); transition: .15s;
    display: block;
  }
  .domain-card:hover { border-color: var(--cyan); transform: translateY(-2px); box-shadow: 0 10px 30px -14px rgba(47,224,207,.5); }
  .domain-card .icon { font-size: 40px; margin-bottom: 10px; }
  .domain-card .name { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
  .domain-card .count { color: var(--cyan); font-size: 15px; }
  .domain-card .go { color: var(--muted); font-size: 13px; margin-top: 12px; }
</style>
</head>
<body data-page="stock">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content">
    <h1>คลังสินค้า / Stock</h1>
    <p class="subtitle">เลือกคลังที่ต้องการจัดการ</p>

    <div class="domain-grid" id="domain-grid">
      <a class="domain-card" href="stock-list.html?domain=construction">
        <div class="icon">🏗️</div>
        <div class="name">คลังก่อสร้าง</div>
        <div class="count" id="count-construction">กำลังนับ...</div>
        <div class="go">เข้าจัดการคลัง &rarr;</div>
      </a>
      <a class="domain-card" href="stock-medicine.html">
        <div class="icon">💊</div>
        <div class="name">คลังยา</div>
        <div class="count" id="count-medicine">กำลังนับ...</div>
        <div class="go">เข้าจัดการคลัง &rarr;</div>
      </a>
      <a class="domain-card" href="stock-feedmill.html">
        <div class="icon">🌾</div>
        <div class="name">คลังโรงงานอาหาร</div>
        <div class="count" id="count-feedmill">กำลังนับ...</div>
        <div class="go">เข้าจัดการคลัง &rarr;</div>
      </a>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;

  for (const domain of ["construction", "medicine", "feedmill"]) {
    const { count } = await sb.from("ops_items").select("*", { count: "exact", head: true }).eq("domain", domain);
    document.getElementById("count-" + domain).textContent = `${count ?? 0} รายการสินค้า`;
  }
})();
</script>
</body>
</html>
