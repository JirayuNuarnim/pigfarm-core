<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คลังยา - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body data-page="stock">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content">
    <div class="page-header">
      <div>
        <p style="margin:0;"><a class="link" href="stock.html">&larr; เลือกคลังอื่น</a></p>
        <h1>คลังยา</h1>
        <p class="subtitle">แยกตามฟาร์ม · เก็บบริษัท / วันหมดอายุ / ราคาต่อล็อต</p>
      </div>
      <button class="btn" id="new-item-btn" style="display:none;">+ เพิ่มยาใหม่</button>
    </div>

    <div class="card" style="display:flex; gap:14px; align-items:end; flex-wrap:wrap;">
      <div class="field" style="margin:0; flex:1; min-width:180px;">
        <label>ฟาร์ม</label>
        <select id="farm-filter"></select>
      </div>
      <div class="field" style="margin:0; flex:2; min-width:200px;">
        <label>ค้นหาชื่อยา</label>
        <input type="text" id="q" placeholder="พิมพ์ชื่อยา">
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="num" id="stat-value">-</div><div class="label">มูลค่าคงเหลือ (บาท)</div></div>
      <div class="stat-card"><div class="num" id="stat-items">-</div><div class="label">รายการยาที่มีสต็อก</div></div>
      <div class="stat-card"><div class="num" id="stat-expiring">-</div><div class="label">ใกล้หมดอายุ (90 วัน)</div></div>
    </div>

    <table>
      <thead><tr><th>ชื่อยา</th><th>คงเหลือรวม</th><th>มูลค่า (บาท)</th><th>จำนวนล็อต</th><th>วันหมดอายุใกล้สุด</th><th></th></tr></thead>
      <tbody id="item-rows"><tr><td colspan="6" class="muted">กำลังโหลด...</td></tr></tbody>
    </table>

    <div id="new-item-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center;">
      <div class="card" style="width:380px;">
        <h2 style="margin-top:0;">เพิ่มยาใหม่</h2>
        <form id="new-item-form">
          <div class="field"><label>ชื่อยา</label><input type="text" id="ni-name" required></div>
          <div class="field"><label>หน่วยนับ (เช่น ขวด, กล่อง, ซอง, กก.)</label><input type="text" id="ni-unit" value="ขวด"></div>
          <button class="btn" type="submit">บันทึก</button>
          <button class="btn secondary" type="button" id="ni-cancel">ยกเลิก</button>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script>
function fmtDate(d) { return d ? new Date(d + "T00:00:00").toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" }) : "-"; }
function daysUntil(d) { return d ? Math.round((new Date(d + "T00:00:00") - new Date()) / 86400000) : Infinity; }

let SELECTED_FARM = null;

async function loadFarms() {
  const sel = document.getElementById("farm-filter");
  let farms = [];
  if (canSeeAllFarms()) {
    const { data } = await sb.from("farms").select("name").order("name");
    farms = (data || []).map(f => f.name);
  } else {
    farms = myFarms();
  }
  sel.innerHTML = farms.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join("");
  SELECTED_FARM = farms[0] || null;
}

async function loadSummary() {
  SELECTED_FARM = document.getElementById("farm-filter").value;
  const { data, error } = await sb.from("ops_lot_summary").select("*").eq("domain", "medicine").eq("location", SELECTED_FARM).order("name");
  const tbody = document.getElementById("item-rows");
  if (error) { tbody.innerHTML = `<tr><td colspan="6" class="muted">โหลดไม่สำเร็จ: ${escapeHtml(error.message)}</td></tr>`; return; }
  const rows = data || [];

  document.getElementById("stat-value").textContent = formatNumber(rows.reduce((s, r) => s + Number(r.total_value), 0), 0);
  document.getElementById("stat-items").textContent = rows.length;
  document.getElementById("stat-expiring").textContent = rows.filter(r => { const d = daysUntil(r.nearest_expiry); return d >= 0 && d <= 90; }).length;

  renderRows(rows);
}

function renderRows(rows) {
  const q = document.getElementById("q").value.trim();
  const filtered = rows.filter(r => !q || r.name.includes(q));
  const tbody = document.getElementById("item-rows");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="muted">ยังไม่มียาในคลังของฟาร์มนี้ ${(isOwner() || isCentral() || myDomains().includes("medicine")) ? '— กด "เพิ่มยาใหม่" แล้วเข้าไปเพิ่มล็อต' : ''}</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const d = daysUntil(r.nearest_expiry);
    let badge = "";
    if (r.nearest_expiry && d >= 0 && d <= 90) badge = ' <span class="badge warn">ใกล้หมดอายุ</span>';
    else if (r.nearest_expiry && d < 0) badge = ' <span class="badge danger">หมดอายุแล้ว</span>';
    return `<tr>
      <td>${escapeHtml(r.name)}</td>
      <td class="text-right">${formatNumber(r.total_qty, 0)} ${escapeHtml(r.unit)}</td>
      <td class="text-right">${formatNumber(r.total_value, 0)}</td>
      <td class="text-right">${r.lot_count}</td>
      <td>${fmtDate(r.nearest_expiry)}${badge}</td>
      <td><a class="link" href="stock-medicine-item.html?item=${r.item_id}&farm=${encodeURIComponent(SELECTED_FARM)}">ดูล็อต / จัดการ</a></td>
    </tr>`;
  }).join("");
}

(async () => {
  const user = await requireAuth();
  if (!user) return;
  await loadFarms();
  await loadSummary();

  document.getElementById("farm-filter").addEventListener("change", loadSummary);
  document.getElementById("q").addEventListener("input", loadSummary);

  const canEdit = isOwner() || isCentral() || myDomains().includes("medicine");
  if (canEdit) document.getElementById("new-item-btn").style.display = "";
  document.getElementById("new-item-btn").addEventListener("click", () => document.getElementById("new-item-modal").style.display = "flex");
  document.getElementById("ni-cancel").addEventListener("click", () => document.getElementById("new-item-modal").style.display = "none");
  document.getElementById("new-item-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    // create the item, then jump into its detail page for the selected farm to add lots
    const { data: created, error } = await sb.from("ops_items").insert({
      domain: "medicine",
      name: document.getElementById("ni-name").value.trim(),
      unit: document.getElementById("ni-unit").value.trim() || "ขวด",
    }).select().single();
    if (error) { alert("บันทึกไม่สำเร็จ: " + error.message); return; }
    window.location.href = `stock-medicine-item.html?item=${created.id}&farm=${encodeURIComponent(SELECTED_FARM)}`;
  });
})();
</script>
</body>
</html>
