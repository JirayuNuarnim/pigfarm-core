<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>ใบขอซื้อ - THE CORE</title>
<link rel="stylesheet" href="shared/print.css">
<style>
  #qr-corner { position:absolute; top:10mm; right:12mm; text-align:center; width:34mm; }
  #qrcode { display:inline-block; }
  #qrcode img, #qrcode canvas { width:30mm !important; height:30mm !important; }
  #qr-corner .cap { font-size:10px; color:#333; margin-top:1mm; line-height:1.3; }
  #qr-corner .doc-no { font-weight:bold; font-size:11px; }
  #meta-right { padding-right:38mm; }
  @media print { #meta-right { padding-right:38mm; } }
  #doc-company-sub { text-align:center; font-size:12px; color:#333; margin-bottom:6px; line-height:1.4; }
</style>
</head>
<body>
<div class="toolbar">
  <a class="tb-btn secondary" id="back-btn" href="#">← กลับ</a>
  <button onclick="window.print()">🖨️ พิมพ์</button>
  <span class="tb-hint">ตัวอย่างก่อนพิมพ์ — ขนาดกระดาษ A4 (ด้านล่างคือหน้าจริงที่จะพิมพ์)</span>
</div>
<div class="print-page" style="position:relative;">
  <div id="qr-corner">
    <div id="qrcode"></div>
    <div class="cap"><span class="doc-no" id="qr-doc-no"></span><br>สแกนเพื่ออัปเดตสถานะเอกสาร</div>
  </div>
  <div class="doc-company" id="doc-company"></div>
  <div id="doc-company-sub"></div>
  <div class="doc-title">ใบขอซื้อวัสดุอุปกรณ์</div>
  <div class="doc-meta">
    <div id="meta-left"></div>
    <div id="meta-right"></div>
  </div>
  <table class="doc-table">
    <thead><tr><th style="width:40px;">ลำดับ</th><th>รายการ</th><th>จำนวน</th><th>หน่วย</th><th>ราคา/หน่วย</th><th>รวม</th></tr></thead>
    <tbody id="rows"><tr><td colspan="6">กำลังโหลด...</td></tr></tbody>
  </table>
  <div class="doc-amount-text">(ตัวอักษร) <span class="box" id="amount-text"></span></div>
  <div class="signatures">
    <div class="sig"><div class="line"></div>ผู้ขอ</div>
    <div class="sig"><div class="line"></div>เสมียนส่วนกลาง</div>
    <div class="sig"><div class="line"></div>เจ้าของ (อนุมัติ)</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/thai-baht-text.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  document.getElementById("back-btn").href = "purchase-request.html?id=" + encodeURIComponent(id);

  // QR encodes the absolute URL to this request's detail page (timeline + status buttons)
  const trackUrl = new URL("purchase-request.html?id=" + encodeURIComponent(id), window.location.href).href;
  const qrEl = document.getElementById("qrcode");
  if (window.QRCode && qrEl) {
    new QRCode(qrEl, { text: trackUrl, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
  } else if (qrEl) {
    qrEl.innerHTML = `<div style="font-size:9px; word-break:break-all;">${escapeHtml(trackUrl)}</div>`;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = "index.html"; return; }

  const { data: req } = await sb.from("ops_purchase_requests").select("*").eq("id", id).single();
  if (!req) return;
  document.getElementById("qr-doc-no").textContent = req.doc_no || ("#" + req.id);

  if (req.company_id) {
    const { data: company } = await sb.from("ops_companies").select("name, address, tax_id, phone").eq("id", req.company_id).single();
    if (company) {
      document.getElementById("doc-company").textContent = company.name || "";
      const sub = [company.address, company.tax_id ? "เลขประจำตัวผู้เสียภาษี " + company.tax_id : "", company.phone ? "โทร " + company.phone : ""].filter(Boolean).join(" · ");
      document.getElementById("doc-company-sub").textContent = sub;
    }
  }
  const { data: items } = await sb.from("ops_purchase_request_items").select("*").eq("request_id", id);
  let supplierName = "";
  if (req.supplier_id) {
    const { data: sup } = await sb.from("ops_suppliers").select("name").eq("id", req.supplier_id).single();
    supplierName = sup ? sup.name : "";
  }

  document.getElementById("meta-left").innerHTML = `
    <div>เลขที่: ${escapeHtml(req.doc_no || "#" + req.id)}</div>
    <div>ฟาร์ม: ${escapeHtml(req.farm)}</div>
    <div>หมวดหมู่: ${escapeHtml(DOMAIN_LABELS[req.domain] || req.domain)}</div>
    ${supplierName ? `<div>ผู้ขาย: ${escapeHtml(supplierName)}</div>` : ""}
  `;
  document.getElementById("meta-right").innerHTML = `
    <div>วันที่: ${new Date(req.created_at).toLocaleDateString("th-TH")}</div>
    <div>ผู้ขอ: ${escapeHtml(req.requested_by || "")}</div>
  `;

  let total = 0;
  const rows = (items || []).map((it, i) => {
    const amount = it.qty * it.unit_price;
    total += amount;
    return `<tr>
      <td class="num">${i + 1}</td>
      <td>${escapeHtml(it.description)}</td>
      <td class="num">${formatNumber(it.qty, 0)}</td>
      <td>${escapeHtml(it.unit || "")}</td>
      <td class="num">${formatNumber(it.unit_price)}</td>
      <td class="num">${formatNumber(amount)}</td>
    </tr>`;
  });
  rows.push(`<tr class="doc-total-row"><td colspan="5" class="num">รวมเป็นเงิน</td><td class="num">${formatNumber(total)}</td></tr>`);
  document.getElementById("rows").innerHTML = rows.join("");
  document.getElementById("amount-text").textContent = numberToThaiText(total);
})();
</script>
</body>
</html>
