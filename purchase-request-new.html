<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สร้างใบขอซื้อ - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body data-page="purchase-request">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content">
    <h1>สร้างใบขอซื้อ</h1>
    <div class="card">
      <form id="pr-form">
        <div class="row">
          <div class="field">
            <label>ฟาร์ม</label>
            <select id="farm" required></select>
          </div>
          <div class="field">
            <label>หมวดหมู่</label>
            <select id="domain" required></select>
          </div>
          <div class="field">
            <label>ผู้ขอ</label>
            <input type="text" id="requested-by">
          </div>
        </div>

        <h2>รายการที่ต้องการ</h2>
        <datalist id="item-options"></datalist>
        <table class="items-table" id="items-table">
          <tr><th>รายการ</th><th>จำนวน</th><th>หน่วย</th><th>หมายเหตุ</th><th></th></tr>
          <tbody id="items-body">
            <tr>
              <td><input type="text" name="desc" list="item-options"></td>
              <td><input type="number" step="0.01" name="qty"></td>
              <td><input type="text" name="unit"></td>
              <td><input type="text" name="note"></td>
              <td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td>
            </tr>
            <tr class="row-template" style="display:none;">
              <td><input type="text" name="desc" list="item-options"></td>
              <td><input type="number" step="0.01" name="qty"></td>
              <td><input type="text" name="unit"></td>
              <td><input type="text" name="note"></td>
              <td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td>
            </tr>
          </tbody>
        </table>
        <p><button type="button" class="btn secondary small" onclick="addRow('items-body')">+ เพิ่มแถว</button></p>

        <div class="field"><label>หมายเหตุ</label><textarea id="note" rows="2"></textarea></div>
        <button class="btn" type="submit">บันทึกใบขอซื้อ</button>
        <a class="btn secondary" href="purchase-request.html">ยกเลิก</a>
        <span id="form-status" class="muted"></span>
      </form>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script src="shared/dynamic-rows.js"></script>
<script>
async function loadItemOptions(domain) {
  const { data } = await sb.from("ops_items").select("name").eq("domain", domain).order("name").limit(500);
  document.getElementById("item-options").innerHTML = (data || []).map(i => `<option value="${escapeHtml(i.name)}">`).join("");
}

(async () => {
  const user = await requireAuth();
  if (!user) return;
  document.getElementById("requested-by").value = user.name || user.email;

  const farmSel = document.getElementById("farm");
  let farms = [];
  if (canSeeAllFarms()) {
    const { data } = await sb.from("farms").select("name").order("name");
    farms = (data || []).map(f => f.name);
  } else {
    farms = myFarms();
  }
  farmSel.innerHTML = farms.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join("");

  const domainSel = document.getElementById("domain");
  const domains = canSeeAllFarms() ? Object.keys(DOMAIN_LABELS) : myDomains();
  domainSel.innerHTML = domains.map(d => `<option value="${d}">${DOMAIN_LABELS[d] || d}</option>`).join("");
  await loadItemOptions(domainSel.value);
  domainSel.addEventListener("change", () => loadItemOptions(domainSel.value));

  document.getElementById("pr-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById("form-status");
    const farm = farmSel.value;
    const domain = domainSel.value;
    const rows = [...document.querySelectorAll("#items-body tr:not(.row-template)")];
    const items = rows.map(r => ({
      description: r.querySelector('[name="desc"]').value.trim(),
      qty: parseFloat(r.querySelector('[name="qty"]').value) || 0,
      unit: r.querySelector('[name="unit"]').value.trim(),
      note: r.querySelector('[name="note"]').value.trim(),
    })).filter(it => it.description);

    if (!items.length) { statusEl.textContent = "กรุณาเพิ่มรายการอย่างน้อย 1 รายการ"; return; }

    statusEl.textContent = "กำลังบันทึก...";
    const { data: docNo } = await sb.rpc("ops_next_doc_no", { p_doc_type: "purchase", p_farm: farm });
    const { data: req, error } = await sb.from("ops_purchase_requests").insert({
      doc_no: docNo, farm, domain,
      requested_by: document.getElementById("requested-by").value.trim(),
      note: document.getElementById("note").value.trim(),
    }).select().single();

    if (error) { statusEl.textContent = "บันทึกไม่สำเร็จ: " + error.message; return; }

    const itemRows = items.map(it => ({ ...it, request_id: req.id }));
    const { error: itemErr } = await sb.from("ops_purchase_request_items").insert(itemRows);
    if (itemErr) { statusEl.textContent = "บันทึกรายการไม่สำเร็จ: " + itemErr.message; return; }

    window.location.href = `purchase-request.html?id=${req.id}`;
  });
})();
</script>
</body>
</html>
