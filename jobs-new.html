<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สร้างใบส่งงานช่าง - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body data-page="jobs">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content">
    <h1>สร้างใบส่งงาน / เบิกค่าแรง</h1>
    <div class="card">
      <form id="job-form">
        <div class="row">
          <div class="field"><label>ประเภทงาน</label>
            <select id="job-type">
              <option value="งานช่าง">งานช่าง</option>
              <option value="วิ่งทราย">วิ่งทราย</option>
              <option value="ถมดิน">ถมดิน</option>
              <option value="งานเหมาอื่นๆ">งานเหมาอื่นๆ</option>
            </select>
          </div>
          <div class="field"><label>ฟาร์ม</label><select id="farm" required></select></div>
          <div class="field"><label>วันที่ส่งงาน</label><input type="date" id="txn-date" required></div>
        </div>
        <div class="field"><label>ชื่อช่าง / ผู้รับงาน</label><input type="text" id="worker-name" required></div>
        <div class="field"><label>รายละเอียดงาน</label><textarea id="description" rows="2"></textarea></div>

        <h2>รายการงาน / ค่าแรง</h2>
        <table class="items-table" id="items-table">
          <tr><th>รายการ</th><th>จำนวน</th><th>ราคาต่อหน่วย</th><th>ยอดรวม</th></tr>
          <tbody id="items-body">
            <tr class="calc-row">
              <td><input type="text" name="desc"></td>
              <td><input type="number" step="0.01" class="f-qty" name="qty" value="1"></td>
              <td><input type="number" step="0.01" class="f-price" name="price" value="0"></td>
              <td class="f-amount text-right">0.00</td>
              <td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td>
            </tr>
            <tr class="row-template calc-row" style="display:none;">
              <td><input type="text" name="desc"></td>
              <td><input type="number" step="0.01" class="f-qty" name="qty" value="1"></td>
              <td><input type="number" step="0.01" class="f-price" name="price" value="0"></td>
              <td class="f-amount text-right">0.00</td>
              <td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td>
            </tr>
          </tbody>
          <tfoot><tr><td colspan="3" class="text-right"><b>รวม</b></td><td class="text-right" data-grand-total-for="items-table"><b>0.00</b></td><td></td></tr></tfoot>
        </table>
        <p><button type="button" class="btn secondary small" onclick="addRow('items-body')">+ เพิ่มรายการงาน</button></p>

        <h2>รายการหักเงิน</h2>
        <table class="items-table" id="deduct-table">
          <tr><th>รายการ</th><th>จำนวนเงิน</th><th></th></tr>
          <tbody id="deduct-body">
            <tr><td><input type="text" name="d-desc"></td><td><input type="number" step="0.01" name="d-amount"></td><td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td></tr>
            <tr class="row-template" style="display:none;"><td><input type="text" name="d-desc"></td><td><input type="number" step="0.01" name="d-amount"></td><td><button type="button" class="btn danger small" onclick="removeRow(this)">ลบ</button></td></tr>
          </tbody>
        </table>
        <p><button type="button" class="btn secondary small" onclick="addRow('deduct-body')">+ เพิ่มรายการหัก</button></p>

        <div class="field"><label>หมายเหตุ</label><textarea id="note" rows="2"></textarea></div>
        <button class="btn" type="submit">บันทึกใบส่งงาน</button>
        <a class="btn secondary" href="jobs.html">ยกเลิก</a>
        <span id="form-status" class="muted"></span>
      </form>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script src="shared/dynamic-rows.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;
  document.getElementById("txn-date").value = todayISO();

  const farmSel = document.getElementById("farm");
  let farms = [];
  if (canSeeAllFarms()) {
    const { data } = await sb.from("farms").select("name").order("name");
    farms = (data || []).map(f => f.name);
  } else {
    farms = myFarms();
  }
  farmSel.innerHTML = farms.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join("");

  document.getElementById("job-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById("form-status");
    const farm = farmSel.value;

    const itemRows = [...document.querySelectorAll("#items-body tr:not(.row-template)")].map(r => ({
      description: r.querySelector('[name="desc"]').value.trim(),
      qty: parseFloat(r.querySelector('[name="qty"]').value) || 1,
      unit_price: parseFloat(r.querySelector('[name="price"]').value) || 0,
    })).filter(it => it.description);

    const deductRows = [...document.querySelectorAll("#deduct-body tr:not(.row-template)")].map(r => ({
      description: r.querySelector('[name="d-desc"]').value.trim(),
      amount: parseFloat(r.querySelector('[name="d-amount"]').value) || 0,
    })).filter(d => d.description);

    if (!itemRows.length) { statusEl.textContent = "กรุณาเพิ่มรายการงานอย่างน้อย 1 รายการ"; return; }

    statusEl.textContent = "กำลังบันทึก...";
    const { data: docNo } = await sb.rpc("ops_next_doc_no", { p_doc_type: "job", p_farm: farm });
    const { data: job, error } = await sb.from("ops_job_submissions").insert({
      doc_no: docNo, job_type: document.getElementById("job-type").value, farm,
      worker_name: document.getElementById("worker-name").value.trim(),
      txn_date: document.getElementById("txn-date").value,
      description: document.getElementById("description").value.trim(),
      note: document.getElementById("note").value.trim(),
      created_by: user.user_id,
    }).select().single();

    if (error) { statusEl.textContent = "บันทึกไม่สำเร็จ: " + error.message; return; }

    await sb.from("ops_job_items").insert(itemRows.map(it => ({ ...it, job_id: job.id })));
    if (deductRows.length) await sb.from("ops_job_deductions").insert(deductRows.map(d => ({ ...d, job_id: job.id })));

    window.location.href = `jobs.html?id=${job.id}`;
  });
})();
</script>
</body>
</html>
