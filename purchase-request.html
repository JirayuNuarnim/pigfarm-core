<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ใบขอซื้อ - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  .stage-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .stage-tab { border:1px solid #d9ddda; background:#fff; border-radius:20px; padding:7px 14px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:6px; }
  .stage-tab:hover { border-color:#1d9e75; }
  .stage-tab.active { background:#1d9e75; color:#fff; border-color:#1d9e75; }
  .stage-tab .cnt { background:rgba(0,0,0,.08); border-radius:10px; padding:0 7px; font-size:12px; font-weight:bold; }
  .stage-tab.active .cnt { background:rgba(255,255,255,.25); }
  .att-cat { border:1px solid #e3e7e4; border-radius:10px; padding:12px; margin-bottom:12px; }
  .att-cat h3 { margin:0 0 8px; font-size:15px; }
  .att-thumbs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .att-thumb { position:relative; width:96px; }
  .att-thumb img { width:96px; height:96px; object-fit:cover; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#f4f4f4; }
  .att-thumb .rm { position:absolute; top:-6px; right:-6px; background:#d9534f; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:12px; line-height:20px; padding:0; }
  .att-thumb .cap { font-size:11px; color:#888; text-align:center; margin-top:2px; }
  .att-empty { color:#aaa; font-size:13px; margin-bottom:8px; }
  .paid-badge { background:#1d9e75; color:#fff; border-radius:6px; padding:2px 8px; font-size:13px; }
  .timeline { margin:4px 0; }
  .tl-step { display:flex; gap:14px; align-items:flex-start; }
  .tl-rail { display:flex; flex-direction:column; align-items:center; align-self:stretch; }
  .tl-dot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; flex:0 0 auto; border:2px solid #d9ddda; background:#fff; color:#9aa4a0; }
  .tl-line { width:2px; flex:1; background:#e0e4e1; min-height:16px; }
  .tl-step:last-child .tl-line { display:none; }
  .tl-body { padding-bottom:18px; padding-top:3px; }
  .tl-title { font-weight:bold; }
  .tl-sub { font-size:12px; color:#999; }
  .tl-time { font-size:12px; color:#1d9e75; }
  .tl-step.todo .tl-time { color:#bbb; }
  .tl-step.done .tl-dot { background:#1d9e75; border-color:#1d9e75; color:#fff; }
  .tl-step.done .tl-line { background:#1d9e75; }
  .tl-step.current .tl-dot { border-color:#1d9e75; color:#1d9e75; box-shadow:0 0 0 4px rgba(29,158,117,.15); }
  .tl-step.current .tl-title { color:#1d9e75; }
  .tl-step.reject .tl-dot { background:#d9534f; border-color:#d9534f; color:#fff; }
  .tl-step.reject .tl-title { color:#d9534f; }
  .tl-step.self .tl-dot { background:#c9973a; border-color:#c9973a; color:#fff; }
  .tl-step.self .tl-title { color:#c9973a; }
  .preview-row { display:grid; grid-template-columns: 1.15fr 1fr; gap:16px; margin-bottom:16px; align-items:start; }
  @media (max-width: 1000px) { .preview-row { grid-template-columns: 1fr; } }
  .pv-panel { border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); background:#fff; }
  .pv-head { padding:12px 16px; color:#fff; font-weight:bold; font-size:15px; }
  .pv-head.blue { background:#2b6cb0; }
  .pv-head.purple { background:#7c5cbf; }
  .pv-body { padding:14px 16px; }
  .doc-mini { background:#fff; border:1px solid #e3e7e4; border-radius:8px; padding:16px 20px; color:#000; }
  .doc-mini .m-company { text-align:center; font-weight:bold; font-size:16px; }
  .doc-mini .m-title { text-align:center; font-weight:bold; font-size:15px; text-decoration:underline; margin:4px 0 10px; }
  .doc-mini .m-meta { display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:8px; line-height:1.5; }
  .doc-mini table { width:100%; border-collapse:collapse; }
  .doc-mini th, .doc-mini td { border:1px solid #333; padding:3px 6px; font-size:12.5px; }
  .doc-mini th { background:#eee; }
  .doc-mini .m-total { text-align:right; font-weight:bold; margin-top:6px; font-size:14px; }
  .qt-gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(96px,1fr)); gap:8px; }
  .qt-thumb img { width:100%; height:96px; object-fit:cover; border-radius:6px; border:1px solid #ddd; cursor:pointer; background:#f4f4f4; }
  .qt-empty { color:#999; font-size:13px; }
</style>
</head>
<body data-page="purchase-request">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content" id="main-content">
    <p class="muted">กำลังโหลด...</p>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script src="shared/lightbox.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");
const main = document.getElementById("main-content");

// workflow stages shown as filter tabs (each maps to one or more statuses)
const STAGES = [
  { key: "all",       label: "ทั้งหมด",         statuses: null },
  { key: "wait_c",    label: "รอเสมียนกลาง",    statuses: ["รอเสมียนกลาง"] },
  { key: "wait_o",    label: "รออนุมัติ",       statuses: ["รออนุมัติเจ้าของ"] },
  { key: "approved",  label: "อนุมัติแล้ว",     statuses: ["อนุมัติแล้ว"] },
  { key: "ordered",   label: "สั่งซื้อแล้ว",    statuses: ["สั่งซื้อแล้ว"] },
  { key: "received",  label: "รับของแล้ว",      statuses: ["รับของแล้ว"] },
  { key: "other",     label: "ปฏิเสธ/สั่งเอง",  statuses: ["ปฏิเสธ", "สั่งเองไม่ผ่านอนุมัติ"] },
];

// attachment categories
const ATT_KINDS = [
  { key: "price_compare",   label: "ใบเทียบราคา",                icon: "⚖️" },
  { key: "approval_signed", label: "ใบอนุมัติที่ปริ๊น + เซ็นแล้ว", icon: "🖊️" },
  { key: "receipt",         label: "ใบเสร็จ / บิลซื้อ",            icon: "🧾" },
  { key: "payment",         label: "หลักฐานการจ่ายเงิน",           icon: "💰" },
  { key: "delivery",        label: "หลักฐานส่งของ / รับของ",       icon: "🚚" },
];
const KIND_LABEL = Object.fromEntries(ATT_KINDS.map(k => [k.key, k.label]));

let ALL_ROWS = [];
let ATT_COUNTS = {};
let activeStage = "all";

async function loadListData() {
  const { data } = await sb.from("ops_purchase_requests").select("*").order("id", { ascending: false }).limit(300);
  ALL_ROWS = data || [];
  ATT_COUNTS = {};
  const ids = ALL_ROWS.map(r => r.id);
  if (ids.length) {
    const { data: atts } = await sb.from("ops_attachments").select("entity_id").eq("entity_type", "purchase_request").in("entity_id", ids);
    for (const a of (atts || [])) ATT_COUNTS[a.entity_id] = (ATT_COUNTS[a.entity_id] || 0) + 1;
  }
}

function stageOf(status) {
  for (const s of STAGES) { if (s.statuses && s.statuses.includes(status)) return s.key; }
  return "other";
}
function countFor(stage) {
  if (stage.key === "all") return ALL_ROWS.length;
  return ALL_ROWS.filter(r => stage.statuses.includes(r.status)).length;
}

function renderList() {
  main.innerHTML = `
    <div class="page-header">
      <div><h1>ใบขอซื้อ / จัดซื้อกลาง</h1><p class="subtitle">คำขอซื้อของทุกฟาร์มวิ่งเข้าศูนย์กลางที่นี่ — แยกตามสถานะการดำเนินการ</p></div>
      <button class="btn" id="new-btn">+ สร้างใบขอซื้อใหม่</button>
    </div>
    <div class="stage-tabs" id="stage-tabs"></div>
    <table>
      <thead><tr><th>เลขที่</th><th>ฟาร์ม</th><th>หมวด</th><th>ผู้ขอ</th><th>วันที่</th><th>สถานะ</th><th>จ่ายเงิน</th><th>แนบ</th><th></th></tr></thead>
      <tbody id="pr-rows"><tr><td colspan="9" class="muted">กำลังโหลด...</td></tr></tbody>
    </table>
  `;
  document.getElementById("new-btn").addEventListener("click", () => window.location.href = "purchase-order-new.html");
  renderTabs();
  renderRows();
}

function renderTabs() {
  document.getElementById("stage-tabs").innerHTML = STAGES.map(s => `
    <div class="stage-tab ${activeStage === s.key ? "active" : ""}" data-key="${s.key}">
      ${escapeHtml(s.label)} <span class="cnt">${countFor(s)}</span>
    </div>`).join("");
  document.querySelectorAll(".stage-tab").forEach(t => t.addEventListener("click", () => {
    activeStage = t.dataset.key; renderTabs(); renderRows();
  }));
}

function renderRows() {
  const stage = STAGES.find(s => s.key === activeStage);
  const rows = (stage.key === "all") ? ALL_ROWS : ALL_ROWS.filter(r => stage.statuses.includes(r.status));
  const tbody = document.getElementById("pr-rows");
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="9" class="muted">ไม่มีรายการในสถานะนี้</td></tr>`; return; }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${escapeHtml(r.doc_no || "#" + r.id)}</td>
      <td>${escapeHtml(r.farm)}</td>
      <td>${escapeHtml(DOMAIN_LABELS[r.domain] || r.domain)}</td>
      <td>${escapeHtml(r.requested_by || "")}</td>
      <td>${new Date(r.created_at).toLocaleDateString("th-TH")}</td>
      <td><span class="badge ${STATUS_BADGE_CLASS[r.status] || ""}">${escapeHtml(r.status)}</span></td>
      <td>${r.paid_at ? '<span class="paid-badge">จ่ายแล้ว</span>' : '<span class="muted">—</span>'}</td>
      <td>${ATT_COUNTS[r.id] ? "📎 " + ATT_COUNTS[r.id] : '<span class="muted">—</span>'}</td>
      <td><a class="link" href="purchase-request.html?id=${r.id}">ดูรายละเอียด</a></td>
    </tr>
  `).join("");
}

function fmtDT(t) {
  return t ? new Date(t).toLocaleString("th-TH", { day: "numeric", month: "short", year: "2-digit", hour: "2-digit", minute: "2-digit" }) : "";
}

// full workflow shown as a vertical timeline, current step highlighted
function renderTimeline(req, approvedAt, rejected) {
  const isReject = req.status === "ปฏิเสธ";
  const isSelf = req.status === "สั่งเองไม่ผ่านอนุมัติ";
  const STATUS_STEP = { "รอเสมียนกลาง": 0, "รออนุมัติเจ้าของ": 1, "อนุมัติแล้ว": 2, "สั่งซื้อแล้ว": 3, "รับของแล้ว": 4 };
  let current = STATUS_STEP[req.status];
  if (current === undefined) current = 1; // rejected/self stopped around approval

  const steps = [
    { title: "สร้างใบขอซื้อ", sub: "รอเสมียนกลางจัดการราคา/ผู้ขาย", time: req.created_at },
    { title: "ส่งให้เจ้าของอนุมัติ", sub: "รอเจ้าของพิจารณา", time: req.submitted_at },
    { title: "เจ้าของอนุมัติ", sub: "ปริ๊นใบอนุมัติให้เซ็น แล้วแนบรูป", time: approvedAt },
    { title: "สั่งซื้อแล้ว", sub: "สั่งของกับผู้ขาย + แนบบิล/ใบเสร็จ", time: req.ordered_at },
    { title: "รับของแล้ว", sub: "ตรวจรับ + แนบหลักฐานส่งของ", time: req.received_at },
  ];

  let html = steps.map((s, i) => {
    let cls, dot, title = s.title, sub = s.sub, time = s.time;
    if (isReject && i === 2) { cls = "reject"; dot = "✕"; title = "เจ้าของปฏิเสธ"; sub = rejected?.note ? ("เหตุผล: " + rejected.note) : ""; time = rejected?.created_at; }
    else if (isSelf && i === 2) { cls = "self"; dot = "!"; title = "สั่งเอง ไม่ผ่านการอนุมัติ"; sub = "แนบเอกสารประกอบไว้เป็นหลักฐาน"; time = null; }
    else if ((isReject || isSelf) && i > 2) { cls = "todo"; dot = i + 1; }
    else if ((isReject || isSelf) && i < 2) { cls = "done"; dot = "✓"; }
    else if (i < current) { cls = "done"; dot = "✓"; }
    else if (i === current) { cls = "current"; dot = i + 1; }
    else { cls = "todo"; dot = i + 1; }
    const timeHtml = time ? `<div class="tl-time">${fmtDT(time)}</div>` : (cls === "todo" ? `<div class="tl-time">— ยังไม่ถึงขั้นนี้ —</div>` : "");
    return `<div class="tl-step ${cls}">
      <div class="tl-rail"><div class="tl-dot">${dot}</div><div class="tl-line"></div></div>
      <div class="tl-body"><div class="tl-title">${title}</div>${sub ? `<div class="tl-sub">${escapeHtml(sub)}</div>` : ""}${timeHtml}</div>
    </div>`;
  }).join("");

  const paid = req.paid_at;
  html += `<div class="tl-step ${paid ? "done" : "todo"}">
    <div class="tl-rail"><div class="tl-dot">${paid ? "✓" : "฿"}</div></div>
    <div class="tl-body"><div class="tl-title">จ่ายเงิน${paid ? "" : " (ยังไม่จ่าย)"}</div><div class="tl-sub">แนบหลักฐานการจ่ายเงิน</div>${paid ? `<div class="tl-time">${fmtDT(paid)}</div>` : ""}</div>
  </div>`;
  return html;
}

// visual preview of the saved purchase-order document (top-left of detail page)
function renderDocPreview(req, items, supplierName) {
  const el = document.getElementById("doc-preview");
  if (!el) return;
  const dateStr = new Date(req.created_at).toLocaleDateString("th-TH");
  const rows = (items || []).map((it, i) => `<tr>
    <td style="text-align:center;">${i + 1}</td>
    <td>${escapeHtml(it.description)}</td>
    <td style="text-align:right;">${formatNumber(it.qty, 0)}</td>
    <td style="text-align:right;">${formatNumber(it.unit_price)}</td>
    <td style="text-align:right;">${formatNumber(it.qty * it.unit_price)}</td></tr>`).join("");
  const total = (items || []).reduce((s, it) => s + it.qty * it.unit_price, 0);
  el.innerHTML = `<div class="doc-mini">
    <div class="m-company">บริษัท เอสเจเอฟ ฟาร์ม จำกัด</div>
    <div class="m-title">ใบขอซื้อวัสดุอุปกรณ์</div>
    <div class="m-meta">
      <div>เลขที่: ${escapeHtml(req.doc_no || "#" + req.id)}<br>ฟาร์ม: ${escapeHtml(req.farm)}<br>ผู้ขาย: ${escapeHtml(supplierName || "-")}</div>
      <div style="text-align:right;">วันที่: ${dateStr}<br>ผู้ขอ: ${escapeHtml(req.requested_by || "")}<br>สถานะ: ${escapeHtml(req.status)}</div>
    </div>
    <table><thead><tr><th style="width:28px;">#</th><th>รายการ</th><th style="width:52px;">จำนวน</th><th style="width:64px;">ราคา</th><th style="width:72px;">รวม</th></tr></thead>
    <tbody>${rows || `<tr><td colspan="5" style="text-align:center;color:#999;padding:10px;">— ไม่มีรายการ —</td></tr>`}</tbody></table>
    <div class="m-total">รวมเป็นเงิน ${formatNumber(total)} บาท</div>
    ${req.note ? `<div style="font-size:12px;margin-top:6px;">หมายเหตุ: ${escapeHtml(req.note)}</div>` : ""}
  </div>`;
}

async function renderDetail() {
  const { data: req, error } = await sb.from("ops_purchase_requests").select("*").eq("id", requestId).single();
  if (error || !req) { main.innerHTML = `<div class="card"><h1>ไม่พบใบขอซื้อ</h1></div>`; return; }
  const { data: items } = await sb.from("ops_purchase_request_items").select("*").eq("request_id", requestId);
  const { data: suppliers } = await sb.from("ops_suppliers").select("*").order("name");
  const { data: approvals } = await sb.from("ops_approvals").select("decision, note, created_at").eq("request_id", requestId).order("created_at");
  const approvedAt = (approvals || []).find(a => a.decision === "อนุมัติ")?.created_at || null;
  const rejected = (approvals || []).find(a => a.decision === "ปฏิเสธ");
  const userId = (await sb.auth.getUser()).data.user.id;

  const canPrice = isOwner() || isCentral();
  const canApprove = isOwner() && req.status === "รออนุมัติเจ้าของ";
  const canSubmitForApproval = (isOwner() || isCentral()) && req.status === "รอเสมียนกลาง";
  const canMarkOrdered = (isOwner() || isCentral()) && req.status === "อนุมัติแล้ว";
  const canMarkReceived = (isOwner() || isCentral()) && req.status === "สั่งซื้อแล้ว";
  const canSelfOrder = myFarms().includes(req.farm) && ["รอเสมียนกลาง"].includes(req.status);
  const canManage = isOwner() || isCentral();

  main.innerHTML = `
    <div class="page-header">
      <div><h1>${escapeHtml(req.doc_no || "#" + req.id)} <span class="badge ${STATUS_BADGE_CLASS[req.status] || ""}">${escapeHtml(req.status)}</span> ${req.paid_at ? '<span class="paid-badge">จ่ายแล้ว</span>' : ""}</h1>
      <p class="subtitle">ฟาร์ม ${escapeHtml(req.farm)} · ${escapeHtml(DOMAIN_LABELS[req.domain] || req.domain)} · ผู้ขอ ${escapeHtml(req.requested_by || "")}</p></div>
      <div style="display:flex; gap:8px;">
        <a class="btn secondary" href="purchase-request.html">← กลับรายการ</a>
        <a class="btn secondary" href="purchase-request-print.html?id=${req.id}" target="_blank">🖨️ พิมพ์</a>
      </div>
    </div>

    <div class="preview-row">
      <div class="pv-panel">
        <div class="pv-head blue">👁️ ตัวอย่างเอกสาร</div>
        <div class="pv-body"><div id="doc-preview"></div></div>
      </div>
      <div class="pv-panel">
        <div class="pv-head purple">📑 ใบเสนอราคา / เอกสารที่แนบ</div>
        <div class="pv-body"><div id="attached-docs"><p class="muted" style="font-size:13px;">กำลังโหลด...</p></div></div>
      </div>
    </div>

    <div class="card">
      <h2>ขั้นตอนการดำเนินการ</h2>
      <div class="timeline">${renderTimeline(req, approvedAt, rejected)}</div>
    </div>

    <div class="card">
      <h2>ผู้ขาย</h2>
      <select id="supplier-select" ${canPrice ? "" : "disabled"}>
        <option value="">-- ไม่ระบุ --</option>
        ${(suppliers || []).map(s => `<option value="${s.id}" ${req.supplier_id == s.id ? "selected" : ""}>${escapeHtml(s.name)}${s.phone ? " (" + escapeHtml(s.phone) + ")" : ""}</option>`).join("")}
      </select>
      ${canPrice ? '<button class="btn small" id="save-supplier-btn" style="margin-top:8px;">บันทึกผู้ขาย</button>' : ""}
    </div>

    <div class="card">
      <h2>รายการ</h2>
      <table>
        <thead><tr><th>รายการ</th><th>จำนวน</th><th>หน่วย</th><th>ราคา/หน่วย</th><th>รวม</th>${canPrice ? "<th></th>" : ""}</tr></thead>
        <tbody id="items-body">
          ${(items || []).map(it => `
            <tr data-id="${it.id}">
              <td>${escapeHtml(it.description)}</td>
              <td class="text-right">${canPrice ? `<input type="number" step="0.01" class="pr-qty" value="${it.qty}" style="width:70px;">` : formatNumber(it.qty, 0)}</td>
              <td>${escapeHtml(it.unit || "")}</td>
              <td class="text-right">${canPrice ? `<input type="number" step="0.01" class="pr-price" value="${it.unit_price}" style="width:90px;">` : formatNumber(it.unit_price)}</td>
              <td class="text-right">${formatNumber(it.qty * it.unit_price)}</td>
              ${canPrice ? `<td><button class="btn small save-price-btn">บันทึก</button></td>` : ""}
            </tr>
          `).join("")}
          <tr><td colspan="4" class="text-right"><b>รวมทั้งหมด</b></td><td class="text-right"><b>${formatNumber((items || []).reduce((s, it) => s + it.qty * it.unit_price, 0))}</b></td>${canPrice ? "<td></td>" : ""}</tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>ดำเนินการ</h2>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        ${canSubmitForApproval ? '<button class="btn" id="submit-approval-btn">ส่งให้เจ้าของอนุมัติ</button>' : ""}
        ${canApprove ? '<button class="btn" id="approve-btn">✅ อนุมัติ</button><button class="btn danger" id="reject-btn">❌ ปฏิเสธ</button>' : ""}
        ${canMarkOrdered ? '<button class="btn" id="ordered-btn">บันทึกว่าสั่งซื้อแล้ว</button>' : ""}
        ${canMarkReceived ? '<button class="btn" id="received-btn">บันทึกว่ารับของแล้ว</button>' : ""}
        ${canSelfOrder ? '<button class="btn secondary" id="self-order-btn">สั่งเอง ไม่ผ่านอนุมัติ</button>' : ""}
        ${canManage ? (req.paid_at
          ? '<button class="btn secondary small" id="unpaid-btn">ยกเลิกสถานะจ่ายแล้ว</button>'
          : '<button class="btn small" id="paid-btn">💰 ทำเครื่องหมายว่าจ่ายแล้ว</button>') : ""}
      </div>
      <div id="action-status" class="muted" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2>เอกสาร / รูปภาพแนบ</h2>
      <p class="subtitle" style="margin-top:-6px;">แนบรูปใบอนุมัติที่ปริ๊นเซ็นแล้ว, บิล/ใบเสร็จ, หลักฐานจ่ายเงิน และหลักฐานส่งของ</p>
      <div id="att-cats">กำลังโหลด...</div>
    </div>
  `;

  const supplierName = (suppliers || []).find(s => s.id == req.supplier_id)?.name || "";
  renderDocPreview(req, items, supplierName);

  document.getElementById("save-supplier-btn")?.addEventListener("click", async () => {
    const supplierId = document.getElementById("supplier-select").value || null;
    const { error } = await sb.from("ops_purchase_requests").update({ supplier_id: supplierId }).eq("id", requestId);
    document.getElementById("action-status").textContent = error ? "บันทึกไม่สำเร็จ" : "บันทึกผู้ขายแล้ว";
    if (!error) renderDetail();
  });

  document.querySelectorAll(".save-price-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const row = btn.closest("tr");
      const qty = parseFloat(row.querySelector(".pr-qty").value) || 0;
      const price = parseFloat(row.querySelector(".pr-price").value) || 0;
      const { error } = await sb.from("ops_purchase_request_items").update({ qty, unit_price: price }).eq("id", row.dataset.id);
      if (!error) renderDetail();
    });
  });

  const statusEl = document.getElementById("action-status");
  const nowISO = () => new Date().toISOString();
  async function setStatus(newStatus, okMsg, extra = {}) {
    const { error } = await sb.from("ops_purchase_requests").update({ status: newStatus, ...extra }).eq("id", requestId);
    statusEl.textContent = error ? ("เกิดข้อผิดพลาด: " + error.message) : okMsg;
    if (!error) renderDetail();
  }

  document.getElementById("submit-approval-btn")?.addEventListener("click", () => setStatus("รออนุมัติเจ้าของ", "ส่งให้เจ้าของอนุมัติแล้ว", { submitted_at: nowISO() }));
  document.getElementById("ordered-btn")?.addEventListener("click", () => setStatus("สั่งซื้อแล้ว", "บันทึกว่าสั่งซื้อแล้ว", { ordered_at: nowISO() }));
  document.getElementById("received-btn")?.addEventListener("click", () => setStatus("รับของแล้ว", "บันทึกว่ารับของแล้ว — อย่าลืมแนบหลักฐานส่งของด้านล่าง", { received_at: nowISO() }));
  document.getElementById("self-order-btn")?.addEventListener("click", () => setStatus("สั่งเองไม่ผ่านอนุมัติ", "บันทึกว่าสั่งเอง — อย่าลืมแนบเอกสารด้านล่าง"));

  document.getElementById("approve-btn")?.addEventListener("click", async () => {
    await sb.from("ops_approvals").insert({ request_id: requestId, decided_by: userId, decision: "อนุมัติ" });
    setStatus("อนุมัติแล้ว", "อนุมัติเรียบร้อยแล้ว — ปริ๊นใบอนุมัติให้เซ็น แล้วแนบรูปด้านล่าง");
  });
  document.getElementById("reject-btn")?.addEventListener("click", async () => {
    const note = prompt("เหตุผลที่ปฏิเสธ (ถ้ามี)") || "";
    await sb.from("ops_approvals").insert({ request_id: requestId, decided_by: userId, decision: "ปฏิเสธ", note });
    setStatus("ปฏิเสธ", "ปฏิเสธคำขอแล้ว");
  });

  document.getElementById("paid-btn")?.addEventListener("click", async () => {
    const { error } = await sb.from("ops_purchase_requests").update({ paid_at: new Date().toISOString() }).eq("id", requestId);
    statusEl.textContent = error ? "บันทึกไม่สำเร็จ" : "ทำเครื่องหมายว่าจ่ายแล้ว";
    if (!error) renderDetail();
  });
  document.getElementById("unpaid-btn")?.addEventListener("click", async () => {
    const { error } = await sb.from("ops_purchase_requests").update({ paid_at: null }).eq("id", requestId);
    if (!error) renderDetail();
  });

  await renderAttachments(userId);
}

async function renderAttachments(userId) {
  const { data: atts } = await sb.from("ops_attachments").select("*")
    .eq("entity_type", "purchase_request").eq("entity_id", requestId).order("created_at", { ascending: false });
  const byKind = {};
  for (const a of (atts || [])) { const k = a.kind || "other"; (byKind[k] = byKind[k] || []).push(a); }

  const cats = ATT_KINDS.slice();
  if (byKind.other && byKind.other.length) cats.push({ key: "other", label: "อื่นๆ", icon: "📎" });

  const container = document.getElementById("att-cats");
  container.innerHTML = cats.map(cat => {
    const list = byKind[cat.key] || [];
    const thumbs = list.map(a => `
      <div class="att-thumb">
        <img data-path="${escapeHtml(a.storage_path)}" alt="loading" title="กดเพื่อดูเต็ม">
        ${(isOwner() || isCentral()) ? `<button class="rm" data-id="${a.id}" data-path="${escapeHtml(a.storage_path)}" title="ลบ">✕</button>` : ""}
        <div class="cap">${new Date(a.created_at).toLocaleDateString("th-TH")}</div>
      </div>`).join("");
    return `
      <div class="att-cat">
        <h3>${cat.icon} ${escapeHtml(cat.label)} <span class="muted" style="font-weight:normal;">(${list.length})</span></h3>
        <div class="att-thumbs">${thumbs || '<span class="att-empty">ยังไม่มีรูป</span>'}</div>
        ${cat.key !== "other" ? `
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <input type="file" accept="image/*" class="att-file" data-kind="${cat.key}">
            <button class="btn small att-upload" data-kind="${cat.key}">อัปโหลด</button>
            <span class="att-msg muted" data-kind="${cat.key}" style="font-size:13px;"></span>
          </div>` : ""}
      </div>`;
  }).join("");

  // load thumbnail signed URLs; clicking any opens the full-screen viewer with all attachments
  const imgs = [...container.querySelectorAll("img[data-path]")];
  const signed = [];
  for (const img of imgs) {
    const { data } = await sb.storage.from("ops-attachments").createSignedUrl(img.dataset.path, 600);
    const url = data?.signedUrl || "";
    signed.push(url);
    if (url) img.src = url;
  }
  imgs.forEach((img, i) => { img.style.cursor = "pointer"; img.onclick = () => openLightbox(signed, i); });

  // mirror the attached images into the top gallery panel (like the create dashboard)
  const gal = document.getElementById("attached-docs");
  if (gal) {
    const valid = signed.filter(Boolean);
    if (!valid.length) {
      gal.innerHTML = `<div class="qt-empty">ยังไม่มีเอกสารแนบ</div>`;
    } else {
      gal.innerHTML = `<div class="qt-gallery">` + valid.map((u, i) => `<div class="qt-thumb"><img src="${u}" data-i="${i}"></div>`).join("") + `</div>`;
      gal.querySelectorAll(".qt-thumb img").forEach(img => img.addEventListener("click", () => openLightbox(valid, +img.dataset.i)));
    }
  }

  container.querySelectorAll(".att-upload").forEach(btn => btn.addEventListener("click", async () => {
    const kind = btn.dataset.kind;
    const fileInput = container.querySelector(`.att-file[data-kind="${kind}"]`);
    const msg = container.querySelector(`.att-msg[data-kind="${kind}"]`);
    const file = fileInput.files[0];
    if (!file) { msg.textContent = "เลือกรูปก่อน"; return; }
    msg.textContent = "กำลังอัปโหลด...";
    const safeName = file.name.replace(/[^\w.\-]/g, "_");
    const path = `purchase/${requestId}/${kind}-${Date.now()}-${safeName}`;
    const { error: upErr } = await sb.storage.from("ops-attachments").upload(path, file);
    if (upErr) { msg.textContent = "อัปโหลดไม่สำเร็จ: " + upErr.message; return; }
    const { error: insErr } = await sb.from("ops_attachments").insert({
      entity_type: "purchase_request", entity_id: requestId, storage_path: path,
      kind, note: KIND_LABEL[kind], uploaded_by: userId,
    });
    if (insErr) { msg.textContent = "บันทึกไม่สำเร็จ: " + insErr.message; return; }
    // uploading a payment proof marks the request as paid
    if (kind === "payment") await sb.from("ops_purchase_requests").update({ paid_at: new Date().toISOString() }).eq("id", requestId);
    renderDetail();
  }));

  container.querySelectorAll(".att-thumb .rm").forEach(btn => btn.addEventListener("click", async () => {
    if (!confirm("ลบรูปนี้?")) return;
    await sb.storage.from("ops-attachments").remove([btn.dataset.path]);
    await sb.from("ops_attachments").delete().eq("id", btn.dataset.id);
    renderAttachments(userId);
  }));
}

(async () => {
  const user = await requireAuth();
  if (!user) return;
  if (requestId) { renderDetail(); }
  else { renderList(); await loadListData(); renderTabs(); renderRows(); }
})();
</script>
</body>
