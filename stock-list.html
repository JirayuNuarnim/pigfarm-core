<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คลังสินค้า - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  tr.cat-head td {
    background: linear-gradient(90deg, rgba(47,224,207,.12), rgba(139,109,255,.08), transparent);
    border-top: 2px solid rgba(47,224,207,.35);
    padding: 10px 12px;
  }
  tr.cat-head .cat-name { font-weight: 700; font-size: 15px; color: var(--cyan); }
  tr.cat-head .cat-group {
    margin-left: 8px; font-size: 11px; color: var(--violet);
    border: 1px solid rgba(139,109,255,.4); border-radius: 999px; padding: 2px 9px;
  }
  tr.cat-head .cat-count { float: right; font-size: 12px; color: var(--muted); }
  .mono { font-family: ui-monospace, Consolas, monospace; }
</style>
</head>
<body data-page="stock">
<div class="layout">
  <nav id="nav-root" class="sidebar no-print"></nav>
  <main class="content">
    <div class="page-header">
      <div>
        <p style="margin:0;"><a class="link" href="stock.html">&larr; เลือกคลังอื่น</a></p>
        <h1 id="domain-title">คลังสินค้า</h1>
        <p class="subtitle" id="scope-line"></p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn secondary" id="lnk-issue" href="#">🛒 เบิกของ</a>
        <a class="btn secondary" href="stock-issues.html">📑 ใบเบิก</a>
        <a class="btn secondary" id="lnk-low" href="#">⚠️ ใกล้หมด</a>
        <a class="btn secondary" id="lnk-report" href="#">📊 รายงาน</a>
        <a class="btn secondary" id="lnk-transfer" href="#">🔄 โอน</a>
        <a class="btn secondary" id="lnk-count" href="#">📋 ตรวจนับ</a>
        <button class="btn" id="new-item-btn" style="display:none;">+ เพิ่มสินค้าใหม่</button>
      </div>
    </div>

    <div class="card" style="display:flex; gap:14px; align-items:end; flex-wrap:wrap;">
      <div class="field" style="margin:0; flex:2; min-width:200px;">
        <label>ค้นหาชื่อสินค้า / รหัส</label>
        <input type="text" id="q" placeholder="พิมพ์ชื่อสินค้า หรือรหัส เช่น A01">
      </div>
      <div class="field" style="margin:0; flex:1; min-width:150px;">
        <label>กลุ่มใหญ่</label>
        <select id="group-filter"><option value="">— ทุกกลุ่ม —</option></select>
      </div>
      <div class="field" style="margin:0; flex:1; min-width:150px;">
        <label>หมวดหมู่</label>
        <select id="cat-filter"><option value="">— ทุกหมวด —</option></select>
      </div>
      <div class="field" style="margin:0; flex:1; min-width:160px;">
        <label>ฟาร์ม</label>
        <select id="farm-filter"></select>
      </div>
      <label style="margin:0 0 10px; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); cursor:pointer;">
        <input type="checkbox" id="only-stock"> เฉพาะที่มีของ
      </label>
    </div>

    <p class="muted" id="count-line" style="margin:4px 0 8px; font-size:13px;"></p>
    <table>
      <thead><tr><th style="width:110px;">รหัส</th><th>สินค้า</th><th>หน่วย</th><th>คงเหลือ</th><th>ราคา/หน่วย</th><th></th></tr></thead>
      <tbody id="item-rows"><tr><td colspan="6" class="muted">กำลังโหลด...</td></tr></tbody>
    </table>

    <div id="new-item-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); align-items:center; justify-content:center;">
      <div class="card" style="width:400px;">
        <h2 style="margin-top:0;">เพิ่มสินค้าใหม่ในคลัง<span id="modal-domain-name"></span></h2>
        <form id="new-item-form">
          <div class="field"><label>ชื่อสินค้า</label><input type="text" id="ni-name" required></div>
          <div class="field"><label>หมวดหมู่</label><select id="ni-cat"></select></div>
          <div class="row">
            <div class="field"><label>หน่วยนับ</label><input type="text" id="ni-unit" value="ชิ้น"></div>
            <div class="field"><label>ราคาเริ่มต้น</label><input type="number" step="0.01" id="ni-price" value="0"></div>
          </div>
          <button class="btn" type="submit">บันทึก</button>
          <button class="btn secondary" type="button" id="ni-cancel">ยกเลิก</button>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth-guard.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");
const DOMAIN_NAME = DOMAIN_LABELS[domain] || domain;

async function loadFarmOptions() {
  const sel = document.getElementById("farm-filter");
  let farms = [];
  if (canSeeAllFarms()) {
    const { data } = await sb.from("farms").select("name").order("name");
    farms = (data || []).map(f => f.name);
  } else {
    farms = myFarms();
  }
  sel.innerHTML = farms.map(f => `<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join("");
}

let ALL = [];  // all rows for the selected farm (filtered client-side for instant search)

async function loadFarmData() {
  const farm = document.getElementById("farm-filter").value;
  document.getElementById("scope-line").textContent = `ฟาร์ม: ${farm || "-"}`;
  const tbody = document.getElementById("item-rows");
  tbody.innerHTML = `<tr><td colspan="6" class="muted">กำลังโหลด...</td></tr>`;
  ALL = [];
  let from = 0;
  while (true) {
    const { data, error } = await sb.from("ops_stock_overview").select("*")
      .eq("farm", farm).eq("domain", domain)
      .order("code", { nullsFirst: false }).order("name")
      .range(from, from + 999);
    if (error) {
      tbody.innerHTML = `<tr><td colspan="6" class="muted">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(error.message)}</td></tr>`;
      return;
    }
    ALL = ALL.concat(data || []);
    if (!data || data.length < 1000) break;
    from += 1000;
  }
  buildCategoryFilters();
  renderItems();
}

function buildCategoryFilters() {
  const groupSel = document.getElementById("group-filter");
  const catSel = document.getElementById("cat-filter");
  const curGroup = groupSel.value, curCat = catSel.value;
  const groups = [...new Set(ALL.map(r => r.category_group).filter(Boolean))].sort((a, b) => a.localeCompare(b, "th"));
  groupSel.innerHTML = '<option value="">— ทุกกลุ่ม —</option>' + groups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join("");
  groupSel.value = groups.includes(curGroup) ? curGroup : "";
  const pool = groupSel.value ? ALL.filter(r => r.category_group === groupSel.value) : ALL;
  const cats = [...new Set(pool.map(r => r.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, "th"));
  catSel.innerHTML = '<option value="">— ทุกหมวด —</option>' + cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
  catSel.value = cats.includes(curCat) ? curCat : "";
}

function renderItems() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const group = document.getElementById("group-filter").value;
  const cat = document.getElementById("cat-filter").value;
  const onlyStock = document.getElementById("only-stock").checked;
  const tbody = document.getElementById("item-rows");

  let rows = ALL;
  if (group) rows = rows.filter(r => r.category_group === group);
  if (cat) rows = rows.filter(r => r.category === cat);
  if (onlyStock) rows = rows.filter(r => Number(r.balance) > 0);
  if (q) rows = rows.filter(r => (r.name || "").toLowerCase().includes(q) || (r.code || "").toLowerCase().includes(q));

  document.getElementById("count-line").textContent = `พบ ${rows.length} รายการ จากทั้งหมด ${ALL.length} รายการ`;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="muted">ไม่พบสินค้า ${(isOwner() || isCentral()) ? '— เพิ่มได้ที่ปุ่ม "เพิ่มสินค้าใหม่" ด้านบน' : ''}</td></tr>`;
    return;
  }

  // group into sections: กลุ่มใหญ่ › หมวด (headline per section)
  const sections = new Map();
  for (const r of rows) {
    const key = (r.category_group || "อื่นๆ") + "|" + (r.category || "อื่นๆ");
    if (!sections.has(key)) sections.set(key, []);
    sections.get(key).push(r);
  }

  const html = [];
  for (const [key, items] of sections) {
    const [g, c] = key.split("|");
    const inStock = items.filter(r => Number(r.balance) > 0).length;
    html.push(`<tr class="cat-head"><td colspan="6">
      <span class="cat-name">${escapeHtml(c)}</span>
      <span class="cat-group">${escapeHtml(g)}</span>
      <span class="cat-count">${items.length} รายการ · มีของ ${inStock}</span>
    </td></tr>`);
    for (const it of items) {
      html.push(`<tr>
        <td class="mono" style="color:var(--muted); font-size:12px;">${escapeHtml(it.code || "—")}</td>
        <td>${escapeHtml(it.name)}</td>
        <td>${escapeHtml(it.unit)}</td>
        <td class="text-right">${Number(it.balance) > 0 ? `<b>${formatNumber(it.balance, 0)}</b>` : `<span style="color:var(--muted);">0</span>`} ${it.reorder_point > 0 && it.balance <= it.reorder_point ? '<span class="badge warn">ใกล้หมด</span>' : ''}</td>
        <td class="text-right">${formatNumber(it.unit_price)}</td>
        <td><a class="link" href="stock-item.html?item=${it.item_id}&farm=${encodeURIComponent(it.farm)}">ดู / บันทึกรับ-จ่าย</a></td>
      </tr>`);
    }
  }
  tbody.innerHTML = html.join("");
}

(async () => {
  const user = await requireAuth();
  if (!user) return;
  if (!domain) { window.location.href = "stock.html"; return; }

  document.getElementById("domain-title").textContent = "คลัง" + DOMAIN_NAME;
  document.getElementById("modal-domain-name").textContent = DOMAIN_NAME;

  await loadFarmOptions();
  await loadFarmData();

  const syncToolLinks = () => {
    const farm = encodeURIComponent(document.getElementById("farm-filter").value || "");
    const qs = `?farm=${farm}&domain=${encodeURIComponent(domain)}`;
    document.getElementById("lnk-issue").href = "stock-issue.html" + qs;
    document.getElementById("lnk-low").href = "stock-low.html" + qs;
    document.getElementById("lnk-report").href = "stock-report.html" + qs;
    document.getElementById("lnk-transfer").href = "stock-transfer.html" + qs;
    document.getElementById("lnk-count").href = "stock-count.html" + qs;
  };
  syncToolLinks();

  document.getElementById("q").addEventListener("input", () => renderItems());
  document.getElementById("group-filter").addEventListener("change", () => { buildCategoryFilters(); renderItems(); });
  document.getElementById("cat-filter").addEventListener("change", () => renderItems());
  document.getElementById("only-stock").addEventListener("change", () => renderItems());
  document.getElementById("farm-filter").addEventListener("change", () => { syncToolLinks(); loadFarmData(); });

  if (isOwner() || isCentral()) {
    document.getElementById("new-item-btn").style.display = "";
  }
  document.getElementById("new-item-btn").addEventListener("click", () => {
    // category choices from data already loaded (value = "group|cat")
    const pairs = [...new Set(ALL.filter(r => r.category).map(r => (r.category_group || "") + "|" + r.category))]
      .sort((a, b) => a.localeCompare(b, "th"));
    document.getElementById("ni-cat").innerHTML =
      '<option value="|อื่นๆ">อื่นๆ</option>' +
      pairs.map(p => { const [g, c] = p.split("|"); return `<option value="${escapeHtml(p)}">${escapeHtml(c)}${g ? " (" + escapeHtml(g) + ")" : ""}</option>`; }).join("");
    document.getElementById("new-item-modal").style.display = "flex";
  });
  document.getElementById("ni-cancel").addEventListener("click", () => {
    document.getElementById("new-item-modal").style.display = "none";
  });
  document.getElementById("new-item-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const [niGroup, niCat] = (document.getElementById("ni-cat").value || "|อื่นๆ").split("|");
    const { error } = await sb.from("ops_items").insert({
      domain: domain,
      name: document.getElementById("ni-name").value.trim(),
      unit: document.getElementById("ni-unit").value.trim() || "ชิ้น",
      default_unit_price: parseFloat(document.getElementById("ni-price").value) || 0,
      category: niCat || "อื่นๆ",
      category_group: niGroup || "ทั่วไป",
    });
    if (error) { alert("บันทึกไม่สำเร็จ: " + error.message); return; }
    document.getElementById("new-item-modal").style.display = "none";
    document.getElementById("new-item-form").reset();
    loadFarmData();
  });
})();
</script>
</body>
</html>
