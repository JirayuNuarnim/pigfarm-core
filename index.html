<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ - THE CORE</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>🌾 THE CORE</h1>
    <p id="autologin-msg" class="muted" style="text-align:center; display:none;">กำลังเข้าสู่ระบบ...</p>
    <div id="error-box" class="flash error" style="display:none;"></div>
    <form id="login-form">
      <div class="field">
        <label>อีเมล</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit" style="width:100%;">เข้าสู่ระบบ</button>
    </form>
    <p class="muted" style="text-align:center; margin-top:16px; font-size:13px;">ติดต่อผู้ดูแลระบบหากยังไม่มีบัญชี</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase-client.js"></script>
<script>
// ==== โหมดพัฒนา: ล็อกอินอัตโนมัติ (ปิดหน้าล็อกอินชั่วคราว) ====
// ตั้งเป็น false เพื่อกลับมาใช้หน้าล็อกอินปกติ
const DEV_AUTOLOGIN = true;
const DEV_AUTOLOGIN_EMAIL = "eatgreendrinkclean@gmail.com";
const DEV_AUTOLOGIN_PASSWORD = "TestPassword123!";

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { window.location.href = "dashboard.html"; return; }
  if (DEV_AUTOLOGIN) {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("autologin-msg").style.display = "block";
    const { error } = await sb.auth.signInWithPassword({ email: DEV_AUTOLOGIN_EMAIL, password: DEV_AUTOLOGIN_PASSWORD });
    if (!error) { window.location.href = "dashboard.html"; return; }
    document.getElementById("login-form").style.display = "";
    document.getElementById("autologin-msg").style.display = "none";
  }
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error-box");
  errorBox.style.display = "none";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorBox.textContent = "เข้าสู่ระบบไม่สำเร็จ: อีเมลหรือรหัสผ่านไม่ถูกต้อง";
    errorBox.style.display = "block";
    return;
  }
  window.location.href = "dashboard.html";
});
</script>
</body>
</html>
